  <circle cx="870" cy="190" r="46" fill="url(#bamboo)"/>
  <circle cx="790" cy="288" r="28" fill="#0A6947" fill-opacity="0.85"/>
  <circle cx="950" cy="292" r="28" fill="#0A6947" fill-opacity="0.85"/>
