  <rect x="110" y="92" width="980" height="336" rx="36" stroke="#DFDCDC" stroke-width="2"/>

  <!-- left: prompt -->
  <rect x="170" y="150" width="520" height="54" rx="18" fill="#EAE7E7"/>
  <rect x="170" y="222" width="460" height="54" rx="18" fill="#EAE7E7"/>
  <rect x="170" y="294" width="400" height="54" rx="18" fill="#EAE7E7"/>

